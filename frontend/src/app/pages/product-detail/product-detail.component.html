<div class="detail-page">
  <div class="container">
    <a class="back-link" routerLink="/home">← Back to Store</a>

    <div class="spinner" *ngIf="loading"></div>
    <div class="alert error" *ngIf="error">{{ error }}</div>

    <div class="detail-layout glass-card" *ngIf="product && !loading">
      <div class="detail-image">
        <img *ngIf="product.image_url" [src]="product.image_url" [alt]="product.name" />
        <div class="image-placeholder" *ngIf="!product.image_url">
          <span>◈</span>
        </div>
      </div>

      <div class="detail-info">
        <div class="product-meta">
          <span class="category-tag" *ngIf="product.category">{{ product.category }}</span>
          <span class="owner-id">ID: {{ product.id | slice:0:8 }}...</span>
        </div>

        <h1 class="product-name">{{ product.name }}</h1>

        <p class="product-desc" *ngIf="product.description">{{ product.description }}</p>

        <div class="divider"></div>

        <div class="price-row">
          <span class="price neon-text">${{ product.price.toFixed(2) }}</span>
          <div class="stock-info" [class.out]="product.stock === 0">
            <span class="dot"></span>
            {{ product.stock > 0 ? product.stock + ' units available' : 'Out of stock' }}
          </div>
        </div>

        <div class="alert success" *ngIf="addedToCart">✓ Added to cart!</div>

        <button
          class="neon-btn add-btn"
          (click)="addToCart()"
          [disabled]="product.stock === 0"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          {{ product.stock > 0 ? 'Add to Cart' : 'Out of Stock' }}
        </button>
      </div>
    </div>
  </div>
</div>
